<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lock Screen</title>
  <link rel="stylesheet" href="../../css/lock.css" />
</head>
<body>
  <div class="lock-screen">
    <h1>FILE MANAGER LOCKED</h1>
    <p class="lock-message">This session is locked.</p>
    <form id="unlock-form">
      <label for="unlock-password">Password</label>
      <input id="unlock-password" type="password" />
      <button type="submit" id="unlock">Unlock</button>
    </form>
  </div>
  <script src="../../js/lock.js"></script>
</body>
</html>
